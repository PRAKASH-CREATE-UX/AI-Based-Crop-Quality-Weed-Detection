
{% load static %}
<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <title>Crop Weed Detection Prediction</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: url("{% static 'images/login-bg.jpg' %}");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            height: 100vh;
        }

        .login-box {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            margin: auto;
            margin-top: 10%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .btn-primary:hover {
            background-color: #218838;
        }

        a {
            display: block;
            margin-top: 10px;
            text-align: center;
            color: #007bff;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2> Crop Weed Detection</h2>
    <h2>User Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <a href="{% url 'register' %}">Don't have an account? Register</a>
</div>

</body>
</html>
